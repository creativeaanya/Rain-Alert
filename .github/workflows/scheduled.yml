name: Scheduled Scripts

on:
  schedule:
    # Every minute - runs issoverhead.py
    - cron: '* * * * *'
    # Every day at 2:00 PM UTC - runs main.py
    - cron: '0 14 * * *'

  workflow_dispatch:

jobs:
  every-minute:
    runs-on: ubuntu-latest
    # Only run the every-minute job when triggered by the first schedule
    if: github.event.schedule == '* * * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run issoverhead.py
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        run: python issoverhead.py

  daily:
    runs-on: ubuntu-latest
    # Only run the daily job when triggered by the second schedule
    if: github.event.schedule == '0 14 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        run: python main.py
